<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue client | Action BLA Ghla</title>
    <meta
      name="description"
      content="Découvre notre catalogue client et les produits actuellement proposés."
    />
    <link rel="icon" href="/assets/logo-action-bla-ghla.png" />
    <link rel="apple-touch-icon" href="/assets/logo-action-bla-ghla.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/catalog.css" />
    <script src="/catalog.js" defer></script>
  </head>
  <body>
    <div class="catalog-bg-orb catalog-bg-orb-a" aria-hidden="true"></div>
    <div class="catalog-bg-orb catalog-bg-orb-b" aria-hidden="true"></div>

    <header class="catalog-topbar">
      <div class="catalog-topbar-inner">
        <a class="catalog-brand" href="/catalogue" aria-label="Retour au catalogue">
          <img src="/assets/logo-action-bla-ghla.png" alt="Action BLA Ghla" />
          <div>
            <strong id="catalog-brand-name">Action BLA Ghla</strong>
            <span>Catalogue client</span>
          </div>
        </a>
      </div>
    </header>

    <main class="catalog-shell">
      <section class="catalog-toolbar-shell">
        <div class="catalog-toolbar">
          <label class="catalog-search" aria-label="Rechercher un produit">
            <span class="catalog-search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="M16 16l5 5"></path>
              </svg>
            </span>
            <input
              id="catalog-search-input"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="Rechercher un produit"
            />
          </label>

          <p id="catalog-filter-meta" class="catalog-filter-meta">Chargement du catalogue...</p>
        </div>
      </section>

      <section class="catalog-results">
        <div id="catalog-grid" class="catalog-grid"></div>
      </section>
    </main>

    <div id="catalog-image-modal" class="catalog-image-modal" hidden>
      <button
        id="catalog-image-modal-backdrop"
        class="catalog-image-modal-backdrop"
        type="button"
        aria-label="Fermer l'image"
      ></button>
      <div class="catalog-image-modal-panel" role="dialog" aria-modal="true" aria-labelledby="catalog-image-modal-title">
        <button
          id="catalog-image-modal-close"
          class="catalog-image-modal-close"
          type="button"
          aria-label="Fermer"
        >
          ×
        </button>
        <p id="catalog-image-modal-title" class="catalog-image-modal-title"></p>
        <div class="catalog-image-modal-frame">
          <img id="catalog-image-modal-img" src="" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
